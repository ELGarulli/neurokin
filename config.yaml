skeleton:
    angles:
        joints:
            # some naming mistakes were made during creation of the dlc networks
            left_back_ankle: [HindKneeLeft, BackAnkleLeft, HindPawLeft]
            right_back_ankle: [HindKneeRight, BackAngleRight, HindPawRight]
            left_wrist: [ ElbowLeft, WristLeft, FrontPawLeft ]
            right_wrist: [ ElbowRight, WristRight, FrontPawRight ]
            left_knee: [ HindKneeLeft, HindKneeLeft, BackAnkleLeft ]
            right_knee: [ HindKneeRight, HindKneeRight, BackAngleRight ]
            left_elbow: [ ShoulderLeft, ElbowLeft, FrontPawLeft ]
            right_elbow: [ ShoulderRight, ElbowRight, FrontPawRight ]
            left_hip: [ HipLeft, HindKneeLeft, BackAnkleLeft ]
            right_hip: [ HipRight, HindKneeRight, BackAnkleRight ]
            left_shoulder: [ ShoulderLeft, ElbowLeft, FrontPawLeft ]
            right_shoulder: [ ShoulderRight, ElbowRight, FrontPawRight ]

    references:
        full_body_tilt: [lshoulder, lmtp, mcorner]
        maze_corner_open_right: [mcorner_ol, mcorner_or, mcorner_cr]
    correlations:
        left_shoulder_knee : [lknee, lshoulder]
    distances:
        left_shoulder_to_paw: [ShoulderLeft, ForePawLeft]
        right_shoulder_to_paw: [ShoulderRight, ForePawRight]
        left_hip_to_paw: [HipLeft, HindPawLeft]
        right_hip_to_paw: [HipRight, HindPawRight]
        left_hip_to_shoulder: [HipLeft, ShoulderLeft]
        right_hip_to_shoulder: [HipRight, ShoulderRight]
        left_forepaw_to_hindpaw: [ForePawLeft, HindPawLeft]
        right_forepaw_to_hindpaw: [ForePawRight, HindPawRight]
        hindpaw_to_hindpaw: [HindPawLeft, HindPawRight]
        forepaw_to_forepaw: [ForePawLeft, ForePawRight]
        snout_to_tailbase: [Snout, TailBase]
        maze_corner_closed_right_to_open_right: [MazeCornerClosedRight, MazeCornerOpenRight]
        maze_corner_closed_left_to_open_left: [MazeCornerClosedLeft, MazeCornerOpenLeft]
        maze_corner_closed_right_to_closed_left: [MazeCornerClosedRight, MazeCornerClosedLeft]
        maze_corner_open_right_to_open_left: [MazeCornerOpenRight, MazeCornerOpenLeft]

    elevations:
        left_hip: lhip
        right_hip: rhip
    
