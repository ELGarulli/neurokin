    momentum_dlc2kin.SpeedDLC:
        window_size: 11
        fps: 80

    direction.Direction:
        "front_marker": Snout
        "back_marker": TailBase
        "axis": x

    threshold_based_classification.Immobility:
        # immobility is always calculated for the whole subject.
        # please specify which markers need to be immobile to classify the whole subject as immobile
        immobility_threshold: 10
        minimum_duration_immobility: 0.1
        fps: 80
        marker_ids: [TailBase, Snout]

    threshold_based_classification.Freezing:
        # immobility is always calculated for the whole subject.
        # please specify which markers need to be immobile to classify the whole subject as immobile
        "markers_for_freezing": [Snout, TailBase]
        "front_marker": Snout
        "minimum_duration_freezing": 0.5
        "fps": 80

